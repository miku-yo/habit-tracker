<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7CB89A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="習慣" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>習慣トラッカー</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root {
      --bg: #f4f2ee;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e4e0d8;
      --accent: #7CB89A;
      --accent-soft: #E8F5EE;
      --danger: #c1121f;
      --radius: 12px;
      --font: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      --habit-col: 200px;
      --week-cell: 44px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .nav-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-group button.nav-arrow {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text);
      flex-shrink: 0;
    }

    .nav-group button.nav-arrow:hover { background: var(--accent-soft); }

    .nav-label {
      font-weight: 600;
      min-width: 140px;
      text-align: center;
      font-size: 0.9rem;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .add-form input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      background: var(--surface);
    }

    .color-picker {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 6px;
      width: 100%;
      max-width: 360px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      max-width: 32px;
      max-height: 32px;
      justify-self: center;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
    }

    .color-swatch:hover { opacity: 0.85; }

    .color-swatch.selected {
      border-color: var(--text);
      outline: 2px solid var(--surface);
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }

    .btn-secondary {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--surface);
      color: var(--muted);
    }

    .btn-secondary:hover { color: var(--text); background: var(--accent-soft); }

    .data-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .data-toolbar input[type="file"] { display: none; }

    .data-toolbar-hint {
      font-size: 0.72rem;
      color: var(--muted);
      flex: 1;
      min-width: 180px;
    }

    .bottom-toolbar {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .add-habit-section {
      margin-bottom: 28px;
    }

    .add-habit-section .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* --- 3 Good Things 履歴 --- */
    .good-things-history {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .history-heading {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 220px;
      overflow-y: auto;
    }

    .history-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      cursor: pointer;
      font-family: var(--font);
    }

    .history-item:hover { background: var(--accent-soft); }

    .history-item.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .history-date {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .history-preview {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
      word-break: break-word;
    }

    .history-empty {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* --- リマインド --- */
    .reminder-panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .reminder-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .reminder-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .reminder-toggle input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .reminder-time {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      font-family: var(--font);
      background: var(--surface);
    }

    .reminder-status {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .btn-today {
      width: auto;
      height: 36px;
      min-width: 56px;
      padding: 0 14px;
      font-size: 0.82rem;
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      flex-shrink: 0;
    }

    .btn-today:hover { color: var(--text); background: var(--accent-soft); }

    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .summary-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .summary-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      flex: 1;
      min-width: 140px;
    }

    .summary-item .label { font-size: 0.78rem; color: var(--muted); }
    .summary-item .value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }

    .section {
      margin-bottom: 28px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .section-desc {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tracker-grid {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
    }

    .tracker-grid th,
    .tracker-grid td {
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      text-align: center;
      vertical-align: middle;
    }

    .tracker-grid tr:last-child td { border-bottom: none; }
    .tracker-grid th:last-child,
    .tracker-grid td:last-child { border-right: none; }

    .tracker-grid thead th {
      background: var(--bg);
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
      padding: 8px 4px;
      height: 48px;
    }

    .tracker-grid thead th.corner {
      width: var(--habit-col);
      text-align: left;
      padding: 8px 12px;
      font-size: 0.78rem;
    }

    .day-head .day-num {
      display: block;
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.2;
    }

    .day-head .day-dow {
      display: block;
      font-size: 0.68rem;
      line-height: 1.2;
    }

    .day-head.today .day-num {
      color: var(--accent);
      font-weight: 700;
    }

    .habit-col {
      width: var(--habit-col);
      text-align: left;
      padding: 10px 12px;
      vertical-align: middle;
    }

    .habit-col-inner {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .habit-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }

    .habit-info { flex: 1; min-width: 0; }

    .habit-name {
      font-weight: 600;
      font-size: 0.88rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .habit-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .habit-meta strong { color: var(--accent); font-weight: 700; }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.72rem;
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--danger); }

    /* --- 週表示 --- */
    .week-grid .mark-cell {
      height: var(--week-cell);
      padding: 0;
      cursor: pointer;
      transition: background 0.12s;
    }

    .week-grid .mark-cell:hover:not(.future) { background: var(--accent-soft); }
    .week-grid .mark-cell.today { background: #f8faf8; }

    .week-grid .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      font-size: 1rem;
      line-height: 1;
      color: transparent;
      user-select: none;
    }

    .week-grid .mark-cell.done .mark {
      border-color: currentColor;
      color: inherit;
      font-weight: 700;
    }

    .week-grid .mark-cell.future {
      cursor: not-allowed;
      opacity: 0.35;
    }

    /* --- 月まとめ（ヒートマップ） --- */
    .month-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .month-row:last-child { border-bottom: none; }

    .month-row .habit-col {
      flex-shrink: 0;
      padding: 0;
      width: var(--habit-col);
    }

    .month-body {
      flex: 1;
      min-width: 0;
    }

    .heatmap {
      display: flex;
      gap: 2px;
      width: 100%;
    }

    .heat-cell {
      flex: 1;
      aspect-ratio: 1;
      max-width: 18px;
      min-width: 6px;
      border-radius: 3px;
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: opacity 0.12s;
    }

    .heat-cell:hover:not(.future) { opacity: 0.75; }

    .heat-cell.done {
      border-color: transparent;
    }

    .heat-cell.today {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      z-index: 1;
    }

    .heat-cell.future {
      cursor: not-allowed;
      opacity: 0.3;
    }

    /* 連続達成を帯状に見せる */
    .heat-cell.done.run-start { border-radius: 3px 0 0 3px; margin-right: -2px; }
    .heat-cell.done.run-middle { border-radius: 0; margin-right: -2px; }
    .heat-cell.done.run-end { border-radius: 0 3px 3px 0; }
    .heat-cell.done.run-single { border-radius: 3px; }

    .month-day-labels {
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
      padding-left: calc(var(--habit-col) + 12px);
    }

    .month-day-labels span {
      flex: 1;
      text-align: center;
      font-size: 0.62rem;
      color: var(--muted);
      max-width: 18px;
      min-width: 6px;
    }

    .month-day-labels span.tick {
      color: var(--text);
      font-weight: 600;
    }

    .continuity-legend {
      display: flex;
      gap: 16px;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 8px;
      padding: 0 12px 12px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 28px;
      height: 10px;
      border-radius: 3px;
      background: var(--accent);
    }

    .legend-swatch.gap {
      background: var(--bg);
      border: 1px solid var(--border);
    }

    /* --- 月ごとの目標 --- */
    .month-goals {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--accent-soft);
    }

    .month-goals-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .month-note {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: var(--font);
      background: var(--surface);
      resize: vertical;
      min-height: 44px;
      margin-bottom: 14px;
    }

    .habit-goals {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .habit-goal-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    .habit-goal-row .habit-name-goal {
      flex: 1;
      min-width: 100px;
      font-weight: 600;
    }

    .goal-input-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .goal-days-input {
      width: 48px;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: center;
      font-family: var(--font);
    }

    .goal-progress {
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 90px;
      text-align: right;
    }

    .goal-progress.achieved { color: var(--accent); font-weight: 600; }

    .goal-progress.achieved strong { color: var(--accent); }

    /* --- 3 Good Things --- */
    .good-things-panel {
      padding: 16px;
    }

    .good-things-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .good-thing-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: var(--font);
      background: var(--bg);
    }

    .good-thing-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
    }

    .good-thing-input::placeholder { color: #aaa; }

    .panel-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    footer {
      margin-top: 16px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      :root {
        --habit-col: 120px;
        --week-cell: 42px;
      }

      .app {
        padding: 16px 12px calc(40px + env(safe-area-inset-bottom));
        padding-top: calc(16px + env(safe-area-inset-top));
      }

      h1 { font-size: 1.4rem; }

      .summary-item {
        min-width: calc(50% - 6px);
        padding: 10px 14px;
      }

      .summary-item .value { font-size: 1.2rem; }

      .add-form input[type="text"],
      .good-thing-input,
      .month-note,
      .goal-days-input {
        font-size: 16px;
      }

      .add-form { flex-direction: column; }
      .add-form input[type="text"] { min-width: 0; width: 100%; }
      .color-picker { max-width: none; gap: 5px; }
      .btn-primary { width: 100%; }

      .section-head {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-group {
        justify-content: space-between;
        width: 100%;
      }

      .nav-label {
        min-width: 0;
        flex: 1;
        font-size: 0.78rem;
      }

      .habit-name { font-size: 0.82rem; }
      .habit-meta { font-size: 0.68rem; }

      .week-grid .mark {
        width: 30px;
        height: 30px;
        font-size: 1.05rem;
      }

      .week-grid .mark-cell {
        height: 48px;
        min-width: 42px;
      }

      .habit-goal-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .goal-progress {
        text-align: left;
        min-width: 0;
      }

      .month-day-labels {
        padding-left: calc(var(--habit-col) + 8px);
      }

      .heat-cell {
        min-width: 7px;
        max-width: none;
      }

      .mark-cell,
      .heat-cell,
      .color-swatch,
      .nav-arrow,
      .btn-today,
      .delete-btn {
        touch-action: manipulation;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>習慣トラッカー</h1>
        <p class="subtitle">習慣の記録、月ごとの目標、3 Good Things</p>
      </div>
    </header>

    <div class="summary-bar" id="summaryBar"></div>

    <div id="habitList"></div>

    <section class="section">
      <div class="section-head">
        <div>
          <div class="section-title">リマインド</div>
          <div class="section-desc">毎日、決まった時間に通知します</div>
        </div>
      </div>
      <div class="panel reminder-panel">
        <label class="reminder-toggle">
          <input type="checkbox" id="reminderEnabled" />
          通知をオンにする
        </label>
        <div class="reminder-row">
          <label for="reminderTime">時刻</label>
          <input type="time" id="reminderTime" class="reminder-time" value="19:00" />
          <button type="button" class="btn-secondary" id="reminderTest">テスト</button>
        </div>
        <p class="reminder-status" id="reminderStatus"></p>
      </div>
    </section>

    <div class="data-toolbar bottom-toolbar">
      <button type="button" class="btn-secondary" id="exportBtn">バックアップ</button>
      <button type="button" class="btn-secondary" id="importBtn">復元</button>
      <input type="file" id="importFile" accept="application/json,.json" />
      <span class="data-toolbar-hint">端末を替えるときはバックアップ→復元</span>
    </div>

    <footer>データはこのブラウザに保存されます（localStorage）・v1.3</footer>
  </div>

  <script>
    const STORAGE_KEY = "habit-tracker-v1";
    const REMINDER_KEY = "habit-tracker-reminder";
    const DAY_LABELS = ["日", "月", "火", "水", "木", "金", "土"];
    const PRESET_COLORS = [
      "#8ECBB8", "#9EC5E8", "#F2B5D0", "#C5B3E8", "#F5CCAA",
      "#F2E2A0", "#F5B8B8", "#A8D4A0", "#A8D8E8",
    ];

    let selectedColor = PRESET_COLORS[0];
    let state = loadState();
    let viewYear = new Date().getFullYear();
    let viewMonth = new Date().getMonth();
    let viewWeekStart = getWeekStart(new Date());
    let viewGoodThingsKey = todayKey();

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          return {
            habits: data.habits || [],
            records: data.records || {},
            monthGoals: data.monthGoals || {},
            goodThings: data.goodThings || {},
          };
        }
      } catch (_) {}
      return { habits: [], records: {}, monthGoals: {}, goodThings: {} };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `habit-tracker-${todayKey()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data.habits)) throw new Error("invalid");
          if (!confirm("現在のデータを上書きして復元します。よろしいですか？")) return;
          state = {
            habits: data.habits || [],
            records: data.records || {},
            monthGoals: data.monthGoals || {},
            goodThings: data.goodThings || {},
          };
          saveState();
          render();
          alert("復元が完了しました。");
        } catch (_) {
          alert("ファイルの読み込みに失敗しました。バックアップ JSON を選んでください。");
        }
      };
      reader.readAsText(file);
    }

    function dateKey(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    }

    function keyFromDate(date) {
      return dateKey(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function todayKey() {
      return keyFromDate(new Date());
    }

    function isFutureDate(key) {
      return key > todayKey();
    }

    function getWeekStart(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - d.getDay());
      return d;
    }

    function addDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }

    function formatShortDate(date) {
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function monthKey(year, month) {
      return `${year}-${String(month + 1).padStart(2, "0")}`;
    }

    function keyToDate(key) {
      const [y, m, d] = key.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function ensureMonthGoals(key) {
      if (!state.monthGoals[key]) state.monthGoals[key] = { note: "", habits: {} };
      return state.monthGoals[key];
    }

    function getMonthNote(year, month) {
      return state.monthGoals[monthKey(year, month)]?.note || "";
    }

    function getHabitTarget(year, month, habitId) {
      const t = state.monthGoals[monthKey(year, month)]?.habits?.[habitId]?.targetDays;
      return t > 0 ? t : null;
    }

    function countMonthDone(habitId, year, month) {
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      let done = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        if (isDone(habitId, dateKey(year, month, d))) done++;
      }
      return done;
    }

    function setMonthNote(year, month, note) {
      ensureMonthGoals(monthKey(year, month)).note = note;
      saveState();
    }

    function setHabitTarget(year, month, habitId, value) {
      const key = monthKey(year, month);
      const mg = ensureMonthGoals(key);
      if (!mg.habits[habitId]) mg.habits[habitId] = {};
      const n = parseInt(value, 10);
      if (n > 0) {
        mg.habits[habitId].targetDays = Math.min(n, 31);
      } else {
        delete mg.habits[habitId].targetDays;
        if (Object.keys(mg.habits[habitId]).length === 0) delete mg.habits[habitId];
      }
      saveState();
    }

    function getGoodThings(key) {
      const items = state.goodThings[key];
      if (!items) return ["", "", ""];
      return [items[0] || "", items[1] || "", items[2] || ""];
    }

    function setGoodThing(key, index, value) {
      if (!state.goodThings[key]) state.goodThings[key] = ["", "", ""];
      state.goodThings[key][index] = value;
      if (state.goodThings[key].every((s) => !s.trim())) {
        delete state.goodThings[key];
      }
      saveState();
      const historyList = document.querySelector(".history-list");
      if (historyList) {
        historyList.innerHTML = renderGoodThingsHistory();
        historyList.querySelectorAll(".history-item").forEach((btn) => {
          btn.addEventListener("click", () => {
            viewGoodThingsKey = btn.dataset.key;
            render();
          });
        });
      }
    }

    function formatGoodThingsLabel(key) {
      const d = keyToDate(key);
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${DAY_LABELS[d.getDay()]}）`;
    }

    function getGoodThingsHistoryKeys() {
      return Object.keys(state.goodThings)
        .filter((key) => getGoodThings(key).some((s) => s.trim()))
        .sort((a, b) => b.localeCompare(a));
    }

    function renderGoodThingsHistory() {
      const keys = getGoodThingsHistoryKeys();
      if (keys.length === 0) {
        return `<p class="history-empty">まだ過去の記録はありません</p>`;
      }
      return keys.map((key) => {
        const items = getGoodThings(key).filter((s) => s.trim());
        const preview = items.map((s) => escapeHtml(s)).join(" · ");
        const active = key === viewGoodThingsKey ? " active" : "";
        return `
          <button type="button" class="history-item${active}" data-key="${key}">
            <span class="history-date">${formatGoodThingsLabel(key)}</span>
            <span class="history-preview">${preview}</span>
          </button>
        `;
      }).join("");
    }

    function renderAddHabitSection() {
      return `
        <section class="section add-habit-section">
          <div class="section-title">習慣を追加</div>
          <form class="add-form" id="addForm">
            <input type="text" id="habitName" placeholder="新しい習慣（例：朝のストレッチ）" maxlength="40" required />
            <div class="color-picker" id="colorPicker" role="radiogroup" aria-label="習慣の色"></div>
            <button type="submit" class="btn btn-primary">追加</button>
          </form>
        </section>
      `;
    }

    function getReminderSettings() {
      try {
        const raw = localStorage.getItem(REMINDER_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return { enabled: false, hour: 19, minute: 0, lastSent: "" };
    }

    function saveReminderSettings(settings) {
      localStorage.setItem(REMINDER_KEY, JSON.stringify(settings));
      updateReminderStatus();
    }

    function updateReminderStatus() {
      const el = document.getElementById("reminderStatus");
      if (!el) return;
      if (!("Notification" in window)) {
        el.textContent = "このブラウザは通知に対応していません。";
        return;
      }
      const s = getReminderSettings();
      const perm = Notification.permission;
      if (!s.enabled) {
        el.textContent = "オフです。オンにすると毎日、設定した時刻に通知します。";
        return;
      }
      if (perm === "denied") {
        el.textContent = "通知がブロックされています。Chrome のサイト設定で許可してください。";
        return;
      }
      if (perm === "granted") {
        el.textContent = `毎日 ${String(s.hour).padStart(2, "0")}:${String(s.minute).padStart(2, "0")} に通知します。ホーム画面に追加すると届きやすくなります。`;
        return;
      }
      el.textContent = "通知の許可が必要です。";
    }

    async function registerNotifyWorker() {
      if (!("serviceWorker" in navigator)) return;
      await navigator.serviceWorker.register("./notify-sw.js");
    }

    async function requestReminderPermission() {
      if (!("Notification" in window)) {
        alert("このブラウザは通知に対応していません。");
        return false;
      }
      const perm = await Notification.requestPermission();
      if (perm !== "granted") return false;
      await registerNotifyWorker();
      return true;
    }

    async function showReminderNotification() {
      const body = "今日の習慣と3 Good Thingsを記録しましょう";
      const options = { body, icon: "./icon.svg", tag: "habit-reminder", renotify: true };
      if ("serviceWorker" in navigator) {
        try {
          const reg = await navigator.serviceWorker.ready;
          await reg.showNotification("習慣トラッカー", options);
          return;
        } catch (_) {}
      }
      new Notification("習慣トラッカー", options);
    }

    async function checkReminder() {
      const settings = getReminderSettings();
      if (!settings.enabled || Notification.permission !== "granted") return;
      const now = new Date();
      const today = todayKey();
      if (settings.lastSent === today) return;
      const nowMins = now.getHours() * 60 + now.getMinutes();
      const targetMins = settings.hour * 60 + settings.minute;
      if (nowMins < targetMins || nowMins > targetMins + 4) return;
      await showReminderNotification();
      settings.lastSent = today;
      saveReminderSettings(settings);
    }

    function initReminderUI() {
      const settings = getReminderSettings();
      const enabled = document.getElementById("reminderEnabled");
      const time = document.getElementById("reminderTime");
      const testBtn = document.getElementById("reminderTest");

      enabled.checked = settings.enabled;
      time.value = `${String(settings.hour).padStart(2, "0")}:${String(settings.minute).padStart(2, "0")}`;
      updateReminderStatus();

      if (settings.enabled && Notification.permission === "granted") {
        registerNotifyWorker();
      }

      enabled.addEventListener("change", async () => {
        const next = { ...getReminderSettings(), enabled: enabled.checked };
        if (enabled.checked) {
          const ok = await requestReminderPermission();
          if (!ok) {
            enabled.checked = false;
            next.enabled = false;
            alert("通知を許可するとリマインドが使えます。");
          }
        }
        saveReminderSettings(next);
      });

      time.addEventListener("change", () => {
        const [h, m] = time.value.split(":").map(Number);
        saveReminderSettings({ ...getReminderSettings(), hour: h, minute: m, lastSent: "" });
      });

      testBtn.addEventListener("click", async () => {
        const ok = await requestReminderPermission();
        if (ok) await showReminderNotification();
      });

      setInterval(checkReminder, 60000);
      checkReminder();
    }

    function addHabit(name, color) {
      state.habits.push({
        id: crypto.randomUUID(),
        name: name.trim(),
        color,
        createdAt: todayKey(),
      });
      saveState();
      render();
    }

    function deleteHabit(id) {
      if (!confirm("この習慣を削除しますか？記録も消えます。")) return;
      state.habits = state.habits.filter((h) => h.id !== id);
      for (const key of Object.keys(state.records)) {
        delete state.records[key][id];
        if (Object.keys(state.records[key]).length === 0) delete state.records[key];
      }
      for (const mk of Object.keys(state.monthGoals)) {
        if (state.monthGoals[mk].habits) delete state.monthGoals[mk].habits[id];
      }
      saveState();
      render();
    }

    function toggleRecord(habitId, key) {
      if (isFutureDate(key)) return;
      if (!state.records[key]) state.records[key] = {};
      if (state.records[key][habitId]) {
        delete state.records[key][habitId];
        if (Object.keys(state.records[key]).length === 0) delete state.records[key];
      } else {
        state.records[key][habitId] = true;
      }
      saveState();
      render();
    }

    function isDone(habitId, key) {
      return !!state.records[key]?.[habitId];
    }

    function calcStreak(habitId) {
      let streak = 0;
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      while (true) {
        const key = keyFromDate(d);
        if (isDone(habitId, key)) {
          streak++;
          d.setDate(d.getDate() - 1);
        } else {
          break;
        }
      }
      return streak;
    }

    function calcMonthRate(habitId, year, month) {
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      let total = 0;
      let done = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const cellDate = new Date(year, month, d);
        if (cellDate > today) continue;
        total++;
        if (isDone(habitId, dateKey(year, month, d))) done++;
      }
      return total === 0 ? 0 : Math.round((done / total) * 100);
    }

    function calcLongestStreakInMonth(habitId, year, month) {
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      let longest = 0;
      let current = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        if (isDone(habitId, dateKey(year, month, d))) {
          current++;
          longest = Math.max(longest, current);
        } else {
          current = 0;
        }
      }
      return longest;
    }

    function getRunClass(isDone, prevDone, nextDone) {
      if (!isDone) return "";
      if (prevDone && nextDone) return "run-middle";
      if (prevDone) return "run-end";
      if (nextDone) return "run-start";
      return "run-single";
    }

    function renderHabitCol(habit, extraMeta) {
      return `
        <td class="habit-col">
          <div class="habit-col-inner">
            <span class="habit-dot" style="background:${habit.color}"></span>
            <div class="habit-info">
              <div class="habit-name">${escapeHtml(habit.name)}</div>
              <div class="habit-meta">${extraMeta}</div>
            </div>
            <button type="button" class="delete-btn" data-id="${habit.id}" title="削除">×</button>
          </div>
        </td>
      `;
    }

    function renderSummary() {
      const bar = document.getElementById("summaryBar");
      if (state.habits.length === 0) {
        bar.innerHTML = "";
        return;
      }
      const today = todayKey();
      const doneToday = state.habits.filter((h) => isDone(h.id, today)).length;
      const maxStreak = Math.max(...state.habits.map((h) => calcStreak(h.id)), 0);
      bar.innerHTML = `
        <div class="summary-item">
          <div class="label">登録習慣</div>
          <div class="value">${state.habits.length}</div>
        </div>
        <div class="summary-item">
          <div class="label">今日の達成</div>
          <div class="value">${doneToday} / ${state.habits.length}</div>
        </div>
        <div class="summary-item">
          <div class="label">最長ストリーク</div>
          <div class="value">${maxStreak}日</div>
        </div>
      `;
    }

    function renderGoodThingsSection() {
      const key = viewGoodThingsKey;
      const items = getGoodThings(key);
      const isToday = key === todayKey();
      const isFuture = isFutureDate(key);

      return `
        <section class="section">
          <div class="section-head">
            <div>
              <div class="section-title">3 Good Things</div>
              <div class="section-desc">その日の良かったことを3つ書き留める</div>
            </div>
            <div class="nav-group">
              <button type="button" class="nav-arrow" id="prevGoodDay" aria-label="前の日">&#8592;</button>
              <span class="nav-label">${formatGoodThingsLabel(key)}</span>
              <button type="button" class="nav-arrow" id="nextGoodDay" aria-label="次の日" ${isToday ? "disabled style='opacity:0.35;cursor:not-allowed'" : ""}>&#8594;</button>
              <button type="button" class="btn-today" id="todayGoodDay">今日</button>
            </div>
          </div>
          <div class="panel good-things-panel">
            <div class="good-things-form">
              ${[0, 1, 2].map((i) => `
                <input type="text" class="good-thing-input" data-index="${i}"
                  placeholder="良かったこと ${i + 1}"
                  value="${escapeHtml(items[i])}"
                  maxlength="120"
                  ${isFuture ? "disabled" : ""} />
              `).join("")}
            </div>
            <div class="good-things-history">
              <div class="history-heading">過去の記録（タップで表示）</div>
              <div class="history-list">${renderGoodThingsHistory()}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderMonthGoalsPanel(year, month) {
      if (state.habits.length === 0) return "";
      const note = getMonthNote(year, month);
      const goalRows = state.habits.map((habit) => {
        const target = getHabitTarget(year, month, habit.id);
        const done = countMonthDone(habit.id, year, month);
        const achieved = target && done >= target;
        return `
          <div class="habit-goal-row">
            <span class="habit-dot" style="background:${habit.color}"></span>
            <span class="habit-name-goal">${escapeHtml(habit.name)}</span>
            <span class="goal-input-wrap">
              目標
              <input type="number" class="goal-days-input" data-habit="${habit.id}"
                min="1" max="31" placeholder="—" value="${target || ""}" />
              日
            </span>
            <span class="goal-progress${achieved ? " achieved" : ""}">
              ${target
                ? `<strong>${done}</strong> / ${target}日${achieved ? " 達成!" : ""}`
                : `${done}日達成`}
            </span>
          </div>
        `;
      }).join("");

      return `
        <div class="month-goals">
          <div class="month-goals-label">今月のテーマ・メモ</div>
          <textarea class="month-note" id="monthNote" placeholder="例：毎朝起きたらストレッチをする月">${escapeHtml(note)}</textarea>
          <div class="month-goals-label">習慣ごとの目標日数（月ごとに変更できます）</div>
          <div class="habit-goals">${goalRows}</div>
        </div>
      `;
    }

    function renderWeekSection() {
      const weekEnd = addDays(viewWeekStart, 6);
      const weekLabel = `${formatShortDate(viewWeekStart)}（${DAY_LABELS[viewWeekStart.getDay()]}）〜 ${formatShortDate(weekEnd)}（${DAY_LABELS[weekEnd.getDay()]}）`;
      const today = todayKey();

      let headerCells = `<th class="corner">習慣</th>`;
      const weekDays = [];
      for (let i = 0; i < 7; i++) {
        const d = addDays(viewWeekStart, i);
        const key = keyFromDate(d);
        weekDays.push({ date: d, key });
        const isToday = key === today;
        headerCells += `
          <th class="day-head${isToday ? " today" : ""}">
            <span class="day-num">${d.getDate()}</span>
            <span class="day-dow">${DAY_LABELS[d.getDay()]}</span>
          </th>
        `;
      }

      const bodyRows = state.habits.map((habit) => {
        const streak = calcStreak(habit.id);
        let cells = renderHabitCol(habit, `現在 <strong>${streak}</strong>日連続`);
        for (const { key } of weekDays) {
          const done = isDone(habit.id, key);
          const isToday = key === today;
          const isFuture = isFutureDate(key);
          const classes = ["mark-cell", done ? "done" : "", isToday ? "today" : "", isFuture ? "future" : ""]
            .filter(Boolean).join(" ");
          const colorStyle = done ? `color:${habit.color}` : "";
          cells += `
            <td class="${classes}" data-habit="${habit.id}" data-key="${key}" title="${key}">
              <span class="mark" style="${colorStyle}">${done ? "○" : ""}</span>
            </td>
          `;
        }
        return `<tr>${cells}</tr>`;
      }).join("");

      return `
        <section class="section">
          <div class="section-head">
            <div>
              <div class="section-title">今週</div>
              <div class="section-desc">日々の記録はここでタップ</div>
            </div>
            <div class="nav-group">
              <button type="button" class="nav-arrow" id="prevWeek" aria-label="前の週">&#8592;</button>
              <span class="nav-label">${weekLabel}</span>
              <button type="button" class="nav-arrow" id="nextWeek" aria-label="次の週">&#8594;</button>
              <button type="button" class="btn-today" id="todayWeek">今週</button>
            </div>
          </div>
          <div class="panel panel-scroll">
            <table class="tracker-grid week-grid">
              <thead><tr>${headerCells}</tr></thead>
              <tbody>${bodyRows}</tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderMonthSection() {
      const year = viewYear;
      const month = viewMonth;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = todayKey();

      let dayLabels = "";
      for (let d = 1; d <= daysInMonth; d++) {
        const show = d === 1 || d % 5 === 0 || d === daysInMonth;
        dayLabels += `<span class="${show ? "tick" : ""}">${show ? d : ""}</span>`;
      }

      const rows = state.habits.map((habit) => {
        const streak = calcStreak(habit.id);
        const rate = calcMonthRate(habit.id, year, month);
        const longest = calcLongestStreakInMonth(habit.id, year, month);
        const target = getHabitTarget(year, month, habit.id);
        const monthDone = countMonthDone(habit.id, year, month);
        const goalMeta = target
          ? `目標 <strong>${monthDone}/${target}</strong>日 / `
          : "";

        const doneFlags = [];
        for (let d = 1; d <= daysInMonth; d++) {
          doneFlags.push(isDone(habit.id, dateKey(year, month, d)));
        }

        let heatCells = "";
        for (let d = 1; d <= daysInMonth; d++) {
          const key = dateKey(year, month, d);
          const done = doneFlags[d - 1];
          const prevDone = d > 1 && doneFlags[d - 2];
          const nextDone = d < daysInMonth && doneFlags[d];
          const runClass = getRunClass(done, prevDone, nextDone);
          const isToday = key === today;
          const isFuture = isFutureDate(key);
          const classes = ["heat-cell", done ? "done" : "", runClass, isToday ? "today" : "", isFuture ? "future" : ""]
            .filter(Boolean).join(" ");
          const bg = done ? `background:${habit.color}` : "";
          heatCells += `<div class="${classes}" style="${bg}" data-habit="${habit.id}" data-key="${key}" title="${key}"></div>`;
        }

        return `
          <div class="month-row">
            <div class="habit-col">
              <div class="habit-col-inner">
                <span class="habit-dot" style="background:${habit.color}"></span>
                <div class="habit-info">
                  <div class="habit-name">${escapeHtml(habit.name)}</div>
                  <div class="habit-meta">
                    ${goalMeta}連続 <strong>${streak}</strong>日 /
                    今月最長 <strong>${longest}</strong>日 /
                    <strong>${rate}%</strong>
                  </div>
                </div>
              </div>
            </div>
            <div class="month-body">
              <div class="heatmap">${heatCells}</div>
            </div>
          </div>
        `;
      }).join("");

      return `
        <section class="section">
          <div class="section-head">
            <div>
              <div class="section-title">今月のまとめ</div>
              <div class="section-desc">色の帯＝連続達成。空白＝途切れ</div>
            </div>
            <div class="nav-group">
              <button type="button" class="nav-arrow" id="prevMonth" aria-label="前の月">&#8592;</button>
              <span class="nav-label">${viewYear}年${viewMonth + 1}月</span>
              <button type="button" class="nav-arrow" id="nextMonth" aria-label="次の月">&#8594;</button>
              <button type="button" class="btn-today" id="todayMonth">今月</button>
            </div>
          </div>
          <div class="panel">
            ${renderMonthGoalsPanel(year, month)}
            <div class="month-day-labels">${dayLabels}</div>
            ${rows}
            <div class="continuity-legend">
              <span class="legend-item"><span class="legend-swatch"></span> 連続達成（帯状に表示）</span>
              <span class="legend-item"><span class="legend-swatch gap"></span> 未達成・途切れ</span>
              <span class="legend-item">枠線 = 今日</span>
            </div>
          </div>
        </section>
      `;
    }

    function bindEvents(root) {
      root.querySelectorAll(".mark-cell[data-habit], .heat-cell[data-habit]").forEach((cell) => {
        cell.addEventListener("click", () => {
          toggleRecord(cell.dataset.habit, cell.dataset.key);
        });
      });

      root.querySelectorAll(".delete-btn").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteHabit(btn.dataset.id);
        });
      });

      root.querySelector("#prevWeek")?.addEventListener("click", () => {
        viewWeekStart = addDays(viewWeekStart, -7);
        render();
      });
      root.querySelector("#nextWeek")?.addEventListener("click", () => {
        viewWeekStart = addDays(viewWeekStart, 7);
        render();
      });
      root.querySelector("#todayWeek")?.addEventListener("click", () => {
        viewWeekStart = getWeekStart(new Date());
        render();
      });

      root.querySelector("#prevMonth")?.addEventListener("click", () => {
        viewMonth--;
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        render();
      });
      root.querySelector("#nextMonth")?.addEventListener("click", () => {
        viewMonth++;
        if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        render();
      });
      root.querySelector("#todayMonth")?.addEventListener("click", () => {
        const now = new Date();
        viewYear = now.getFullYear();
        viewMonth = now.getMonth();
        render();
      });

      root.querySelector("#prevGoodDay")?.addEventListener("click", () => {
        const d = keyToDate(viewGoodThingsKey);
        d.setDate(d.getDate() - 1);
        viewGoodThingsKey = keyFromDate(d);
        render();
      });
      root.querySelector("#nextGoodDay")?.addEventListener("click", () => {
        const d = keyToDate(viewGoodThingsKey);
        d.setDate(d.getDate() + 1);
        const next = keyFromDate(d);
        if (!isFutureDate(next)) {
          viewGoodThingsKey = next;
          render();
        }
      });
      root.querySelector("#todayGoodDay")?.addEventListener("click", () => {
        viewGoodThingsKey = todayKey();
        render();
      });

      root.querySelectorAll(".good-thing-input").forEach((input) => {
        input.addEventListener("input", () => {
          setGoodThing(viewGoodThingsKey, parseInt(input.dataset.index, 10), input.value);
        });
      });

      root.querySelectorAll(".history-item").forEach((btn) => {
        btn.addEventListener("click", () => {
          viewGoodThingsKey = btn.dataset.key;
          render();
        });
      });

      const monthNote = root.querySelector("#monthNote");
      monthNote?.addEventListener("input", () => {
        setMonthNote(viewYear, viewMonth, monthNote.value);
      });

      root.querySelectorAll(".goal-days-input").forEach((input) => {
        input.addEventListener("change", () => {
          setHabitTarget(viewYear, viewMonth, input.dataset.habit, input.value);
          render();
        });
      });
    }

    function renderHabits() {
      const list = document.getElementById("habitList");
      const addHabitSection = renderAddHabitSection();
      const goodThings = renderGoodThingsSection();

      if (state.habits.length === 0) {
        list.innerHTML = addHabitSection + goodThings
          + `<div class="empty">習慣を追加して、週表示のマスをクリックして○をつけましょう</div>`;
        bindEvents(list);
        setupAddForm();
        return;
      }

      list.innerHTML = renderWeekSection() + addHabitSection + goodThings + renderMonthSection();
      bindEvents(list);
      setupAddForm();
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function render() {
      renderSummary();
      renderHabits();
    }

    function initColorPicker() {
      const picker = document.getElementById("colorPicker");
      if (!picker) return;
      picker.innerHTML = PRESET_COLORS.map((color) => `
        <button type="button" class="color-swatch${color === selectedColor ? " selected" : ""}"
          style="background:${color}" data-color="${color}"
          aria-label="色 ${color}" aria-checked="${color === selectedColor}"></button>
      `).join("");

      picker.querySelectorAll(".color-swatch").forEach((btn) => {
        btn.addEventListener("click", () => {
          selectedColor = btn.dataset.color;
          picker.querySelectorAll(".color-swatch").forEach((s) => {
            const on = s.dataset.color === selectedColor;
            s.classList.toggle("selected", on);
            s.setAttribute("aria-checked", on);
          });
        });
      });
    }

    function setupAddForm() {
      initColorPicker();
      const form = document.getElementById("addForm");
      if (!form) return;
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const name = document.getElementById("habitName");
        if (!name.value.trim()) return;
        addHabit(name.value, selectedColor);
        name.value = "";
        name.focus();
      });
    }

    document.getElementById("exportBtn").addEventListener("click", exportData);
    document.getElementById("importBtn").addEventListener("click", () => {
      document.getElementById("importFile").click();
    });
    document.getElementById("importFile").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) importData(file);
      e.target.value = "";
    });

    initReminderUI();
    render();
  </script>
</body>
</html>
